version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: heart_failure_api
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../config:/app/config
    environment:
      - ENV=production
    restart: always

  # Optional: add MLflow later
  # mlflow:
  #   image: ghcr.io/mlflow/mlflow
  #   ports:
  #     - "5000:5000"